<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0, shrink-to-fit=yes">


</head>

<body>
    <style>
        .vr-fs {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

        }

        .vr-fs:not(.ios) {
            display: none;
        }

        .vr-fs.ios {
            visibility: hidden;
        }

        .vr-fs.show:not(.ios) {
            display: block;
        }

        .vr-fs.ios.show {
            visibility: visible;
        }

        .container {
            display: inline-block;
            vertical-align: top;
            box-sizing: border-box;
            color: #fff;
            background-color: #000;
            position: relative;
            padding: 0;
            font-size: 10px;
            line-height: 1;
            font-weight: 400;
            font-style: normal;
            font-family: Arial, Helvetica, sans-serif;
            word-break: initial;
            width: 100%;
            max-width: 100%;
            height: 0;
            padding-top: 50%;
        }

        .container #video {
            /* display: none;*/
            visibility: hidden;
        }

        .container .pip-video {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            display: none;
        }

        .container.is-pip canvas {
            display: none;
        }
    </style>
    <div id="container" class="container" style="max-width: 800px; height: 400px; pointer-events: all;">
        <video id="video" style="width: 100%; height: 100%; " loop crossOrigin="anonymous" controls playsinline>
           <!---<source src="https://videos.electroteque.org/bitrate/big_buck_bunny_2000k.mp4">-->
        </video>
        <canvas id="renderer"
            style="background: #000000; width: 100%; height: 100%; position: absolute; top: 0; left: 0; pointer-events: none;"></canvas>
        <div id="buttons"></div>
    </div>



    <script type="importmap">
			{
				"imports": {
					"canvas-pip-fullscreen": "../build/canvas-pip-fullscreen.module.js",
                    "fullscreen-api": "../build/fullscreen-api.module.js",
                    "screenlock-api": "../build/screenlock-api.module.js",
                    "ios-detection-utils": "../build/iosutils.module.js"
				}
			}
		</script>


    <script type="module">
        class VideoController {

            constructor(canvasVideo, mainVideo) {
                this.mainVideo = mainVideo;

                VideoPatcher.patchApi(this, canvasVideo);
            }


            get currentTime() {
                console.log("current time ", this.mainVideo.currentTime);
                return this.mainVideo.currentTime;
            }

            set currentTime(value) {
                this.mainVideo.currentTime = value;
            }

            get duration() {
                console.log("duration ", this.mainVideo.duration);
                return this.mainVideo.duration;
            }

            get seekable() {
                console.log("duration ", this.mainVideo.seekable);
                return this.mainVideo.seekable;
            }


        }

        class VideoPatcher {

            static patchApi(api, video) {


                Object.defineProperty(video, 'duration', {
                    get: () => {
                        return api.duration;
                    },
                    configurable: true,
                    enumerable: true
                });

                /*Object.defineProperty(video, 'duration', {
                    writable: true,
                    configurable: true,
                    enumerable: true
                });*/


               /* Object.defineProperty(video, 'currentTime', {
                    writable: true,
                    configurable: true,
                    enumerable: true
                });*/

                Object.defineProperty(video, 'seekable', {
                    get: () => {
                        return api.seekable;
                    },

                    configurable: true,
                    enumerable: true
                });


                Object.defineProperty(video, 'currentTime', {
                    get: () => {
                        return api.currentTime;
                    },

                    set: (val) => {
                        api.currentTime = val;
                    },
                    configurable: true,
                    enumerable: true
                });


                console.log("patch api ", video);



            }

            static unPatchApi(video) {


                let descriptor;

                ['duration', 'currentTime'].forEach((desc) => {
                    descriptor = Object.getOwnPropertyDescriptor(HTMLMediaElement.prototype, desc);
                    Object.defineProperty(video, desc, descriptor);
                });
            }
        }


        let gl, animation, frameTexLoc, texWidthLoc, texHeightLoc, paused = true;



        import {
            CanvasPipFullscreen,
            CanvasPipFullscreenUtil,
            VideoAnimation
        } from 'canvas-pip-fullscreen';

        import FullscreenApi from 'fullscreen-api';
        import ScreenLockApi from 'screenlock-api';

        const video = document.getElementById('video'),
            canvas = document.getElementById('renderer'),
            container = document.getElementById('container'),
            buttons = document.getElementById('buttons');

        if (!ScreenLockApi.supportsScreenLock) ScreenLockApi.lockElement(container);


        document.addEventListener("touchmove", function(e){

            alert("TOUCH MOVE");
        }, false);

        video.src = "https://videos.electroteque.org/bitrate/big_buck_bunny_2000k.mp4";

        video.addEventListener("loadedmetadata", initCanvas);
        video.addEventListener("play", () => animation && animation.start());
        video.addEventListener("pause", () => animation.stop());
        video.load();

        //const canvasVideo = video.cloneNode(true);
        const canvasVideo =  document.createElement("video");
        canvasVideo.setAttribute("autoplay", true);
        canvasVideo.setAttribute("webkit-playsinline","");
        canvasVideo.setAttribute("playsinline","");
        // canvasVideo.classList.add("vr-fs");
        canvasVideo.controls = true;
        //canvasVideo.removeAttribute("style");
        // canvasVideo.width = 600;
        //canvasVideo.height = 400;
        //canvasVideo.src = null;


        //  container.appendChild(video);

        new VideoController(canvasVideo, video);

        document.body.appendChild(canvasVideo);
        //container2.appendChild(canvasVideo);


        container.addEventListener("click", (e) => {

            if (e.target !== container) return;
            if (paused) {

                video.play();
                paused = false;
            } else {
                paused = true;
                video.pause();
            }


           


            // container.removeEventListener("click", onClick);
        });





        function initCanvas() {
            canvasVideo.srcObject = canvas.captureStream(30);
           // canvasVideo.duration = video.duration;

            video.currentTime = 100;

          

            const config = {
                premultipliedAlpha: false
            };

            gl = canvas.getContext('webgl2', config) || canvas.getContext("webgl", config) || canvas.getContext("experimental-webgl", config);

            const vs = gl.createShader(gl.VERTEX_SHADER);
            gl.shaderSource(vs, 'attribute vec2 c; void main(void) { gl_Position=vec4(c, 0.0, 1.0); }');
            gl.compileShader(vs);
            const fs = gl.createShader(gl.FRAGMENT_SHADER);
            gl.shaderSource(fs, `
                precision mediump float;

                uniform sampler2D frame;

                uniform float texWidth;
                uniform float texHeight;

                void main(void) {
                    vec2 texCoord = vec2(gl_FragCoord.x/texWidth, 1.0 - (gl_FragCoord.y/texHeight));
                    gl_FragColor = texture2D(frame, texCoord);
                }`);
            gl.compileShader(fs);
            if (!gl.getShaderParameter(fs, gl.COMPILE_STATUS)) {
                console.error(gl.getShaderInfoLog(fs));
            }
            const prog = gl.createProgram();
            gl.attachShader(prog, vs);
            gl.attachShader(prog, fs);
            gl.linkProgram(prog);
            gl.useProgram(prog);
            const vb = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, vb);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, 1, -1, -1, 1, -1, 1, 1]), gl.STATIC_DRAW);
            const coordLoc = gl.getAttribLocation(prog, 'c');
            gl.vertexAttribPointer(coordLoc, 2, gl.FLOAT, false, 0, 0);
            gl.enableVertexAttribArray(coordLoc);
            gl.activeTexture(gl.TEXTURE0);
            const frame = gl.createTexture();
            gl.bindTexture(gl.TEXTURE_2D, frame);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);

            frameTexLoc = gl.getUniformLocation(prog, "frame");
            texWidthLoc = gl.getUniformLocation(prog, "texWidth");
            texHeightLoc = gl.getUniformLocation(prog, "texHeight");

            animation = new VideoAnimation(async (now, metadata) => await render(now, metadata), video);

            const onResize = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                gl.viewport(0, 0, video.videoWidth, video.videoHeight);
                gl.uniform1f(texWidthLoc, video.videoWidth);
                gl.uniform1f(texHeightLoc, video.videoHeight);
            };

            video.addEventListener("resize", onResize);

            onResize();

            //animation.start();
        }

        async function render(now, metadata) {

            gl.viewport(0, 0, metadata.width, metadata.height);
            gl.activeTexture(gl.TEXTURE0);
            gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGB, gl.RGB, gl.UNSIGNED_BYTE, video);
            gl.uniform1i(frameTexLoc, 0);
            gl.uniform1f(texWidthLoc, metadata.width);
            gl.uniform1f(texHeightLoc, metadata.height);
            gl.drawArrays(gl.TRIANGLE_FAN, 0, 4);
        }


    </script>

</body>

</html>
